x-upscaling-video2x-base: &upscaling-video2x-base
  build: ./upscaling
  restart: unless-stopped
  profiles: ["upscaling-video2x"]
  gpus: all
  networks:
    - miner-local
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=graphics,video,compute,utility
    - VIDEO2X_BIN=${VIDEO2X_BIN:-video2x}
    - VIDEO2X_DEVICE=${VIDEO2X_DEVICE:-0}
    - VIDEO2X_CODEC=${VIDEO2X_CODEC:-av1_nvenc}
    - VIDEO2X_ALLOW_REQUEST_CODEC=${VIDEO2X_ALLOW_REQUEST_CODEC:-false}
    - VIDEO2X_COMMON_ENCODER_ARGS=${VIDEO2X_COMMON_ENCODER_ARGS:---pix-fmt=yuv420p,--max-b-frames=0}
    - VIDEO2X_ENCODER_OPTIONS=${VIDEO2X_ENCODER_OPTIONS:-preset=p4,cq={cq},profile=main}
    - SHARED_VOLUME_PATH=/tmp/organic-proxy
    - DISABLE_REMOTE_IO=true
    - MAX_CONCURRENT_UPSCALING=${MAX_CONCURRENT_UPSCALING:-2}
    - MAX_QUEUE_SIZE_UPSCALING=${MAX_QUEUE_SIZE_UPSCALING:-5}
    - MINER_CLEANUP_ENABLED=${MINER_CLEANUP_ENABLED:-true}
    - MINER_CLEANUP_INTERVAL_SECONDS=${MINER_CLEANUP_INTERVAL_SECONDS:-300}
    - MINER_CLEANUP_MAX_VOLUME_BYTES=${MINER_CLEANUP_MAX_VOLUME_BYTES:-9000000000}
    - MINER_CLEANUP_MIN_FILE_AGE_SECONDS=${MINER_CLEANUP_MIN_FILE_AGE_SECONDS:-60}
    - MINER_TEMP_FILE_TTL_SECONDS=${MINER_TEMP_FILE_TTL_SECONDS:-}
    - PRESIGNED_URL_CLEANUP_GRACE_SECONDS=${PRESIGNED_URL_CLEANUP_GRACE_SECONDS:-600}
    - MINER_STORAGE_PROVIDER=${MINER_STORAGE_PROVIDER:-s3}
    - MINER_STORAGE_S3_REGION=${MINER_STORAGE_S3_REGION:-us-east-1}
    - MINER_STORAGE_S3_BUCKET_NAME=${MINER_STORAGE_S3_BUCKET_NAME:-}
    - MINER_STORAGE_S3_ACCESS_KEY_ID=${MINER_STORAGE_S3_ACCESS_KEY_ID:-}
    - MINER_STORAGE_S3_SECRET_ACCESS_KEY=${MINER_STORAGE_S3_SECRET_ACCESS_KEY:-}
    - MINER_STORAGE_S3_ENDPOINT_URL=${MINER_STORAGE_S3_ENDPOINT_URL:-${MINER_STORAGE_S3_ENDPOINT:-}}
    - MINER_STORAGE_S3_PRESIGNED_EXPIRY=${MINER_STORAGE_S3_PRESIGNED_EXPIRY:-${S3_PRESIGNED_EXPIRY:-3600}}
  volumes:
    - ${MINER_SHARED_DIR:-/tmp/vidaio-miner-video-tmp}:/tmp/organic-proxy
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

